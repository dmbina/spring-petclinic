name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering

jobs:
  sonarqube-analysis:
    name: Build and Analyze with SonarQube
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the source code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full clone for accurate blame data

      # Step 2: Set up Java 17 (required by Spring PetClinic)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Cache SonarQube scanner packages
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{runner.os}}-sonar
          restore-keys: ${{runner.os}}-sonar

      # Step 4: Build the project and run SonarQube analysis
      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
        run: |
          mvn -B verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=spring-petclinic \
            -Dsonar.projectName='Spring PetClinic' \
            -Dsonar.host.url=${{secrets.SONAR_HOST_URL}} \
            -Dsonar.token=${{secrets.SONAR_TOKEN}} \
            -Dsonar.qualitygate.wait=true

      # Step 5: Check SonarQube Quality Gate
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

      # Step 5: Upload build artifact
      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/*.jar
          retention-days: 7